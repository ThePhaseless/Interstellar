- name: Configure Proxmox NFS Server
  hosts: proxmox
  become: true
  vars_files:
    - vars/proxmox.yaml
  tasks:
    - name: Enable kernel forwarding for Tailscale exit-node traffic
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-tailscale-exit-node.conf
        mode: "0644"
        content: |
          net.ipv4.ip_forward = 1
          net.ipv6.conf.all.forwarding = 1
      notify: Reload sysctl
      tags:
        - exit-node
        - tailscale

    - name: Install NFS kernel server
      ansible.builtin.apt:
        name: nfs-kernel-server
        state: present
        update_cache: true

    - name: Ensure export directories exist
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        mode: "0755"
      loop: "{{ nfs_exports }}"

    - name: Ensure managed media paths exist with shared ownership
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ media_runtime_uid | string }}"
        group: "{{ media_runtime_gid | string }}"
        mode: "2775"
      loop: "{{ media_managed_paths }}"

    - name: Normalize media directory ownership and setgid permissions
      ansible.builtin.shell: |
        set -euo pipefail

        owner_mismatch="$(find "{{ item }}" -xdev -type d \( ! -uid {{ media_runtime_uid }} -o ! -gid {{ media_runtime_gid }} \) | wc -l)"
        mode_mismatch="$(find "{{ item }}" -xdev -type d ! -perm -2775 | wc -l)"

        if [[ "${owner_mismatch}" -gt 0 ]]; then
          find "{{ item }}" -xdev -type d \
            \( ! -uid {{ media_runtime_uid }} -o ! -gid {{ media_runtime_gid }} \) \
            -print0 | xargs -0 -r chown {{ media_runtime_uid }}:{{ media_runtime_gid }}
        fi

        if [[ "${mode_mismatch}" -gt 0 ]]; then
          find "{{ item }}" -xdev -type d ! -perm -2775 -print0 | xargs -0 -r chmod 2775
        fi

        echo "owner_mismatch=${owner_mismatch} mode_mismatch=${mode_mismatch}"
      args:
        executable: /bin/bash
      register: media_dir_permissions
      changed_when: media_dir_permissions.stdout | trim != "owner_mismatch=0 mode_mismatch=0"
      loop: "{{ media_managed_paths }}"

    - name: Configure NFS exports
      ansible.builtin.lineinfile:
        path: /etc/exports
        regexp: "^{{ item.path | regex_escape }}\\s"
        line: "{{ item.path }} {{ nfs_allowed_hosts | map('regex_replace', '$', '(rw,sync,no_subtree_check,no_root_squash)') | join(' ') }}"
        state: present
      loop: "{{ nfs_exports }}"
      notify: Re-export NFS shares

    - name: Enable and start NFS server
      ansible.builtin.systemd:
        name: nfs-kernel-server
        enabled: true
        state: started

    # -- Health checks --
    - name: Flush handlers before health checks
      ansible.builtin.meta: flush_handlers

    - name: Verify NFS server is running
      ansible.builtin.systemd:
        name: nfs-kernel-server
      register: nfs_service
      failed_when: nfs_service.status.ActiveState != "active"

    - name: Verify NFS exports are active
      ansible.builtin.command:
        cmd: exportfs -v
      register: exportfs_output
      changed_when: false
      failed_when: item.path not in exportfs_output.stdout
      loop: "{{ nfs_exports }}"

    - name: Test NFS shares are mountable
      ansible.posix.mount:
        path: "/mnt/nfs-test-{{ idx }}"
        src: "127.0.0.1:{{ item.path }}"
        fstype: nfs
        opts: nfsvers=4.2,noatime
        state: mounted
      loop: "{{ nfs_exports }}"
      loop_control:
        index_var: idx

    - name: Verify test mounts have content access
      ansible.builtin.command:
        cmd: "ls /mnt/nfs-test-{{ idx }}"
      register: mount_ls
      changed_when: false
      loop: "{{ nfs_exports }}"
      loop_control:
        index_var: idx

    - name: Unmount test shares
      ansible.posix.mount:
        path: "/mnt/nfs-test-{{ idx }}"
        state: absent
      loop: "{{ nfs_exports }}"
      loop_control:
        index_var: idx

    - name: Report NFS health
      ansible.builtin.debug:
        msg: >-
          NFS health check passed:
          service={{ nfs_service.status.ActiveState }},
          exports={{ nfs_exports | map(attribute='path') | list | join(', ') }},
          mounts=ok

    # -- Power management --
    - name: Install power management packages
      ansible.builtin.apt:
        name:
          - tlp
          - linux-cpupower
          - powertop
          - hdparm
          - rfkill
        state: present
        update_cache: true
      tags:
        - power

    - name: Configure TLP for server
      ansible.builtin.copy:
        dest: /etc/tlp.d/99-server.conf
        mode: "0644"
        content: |
          CPU_SCALING_GOVERNOR_ON_AC=powersave
          CPU_ENERGY_PERF_POLICY_ON_AC=balance_power
          CPU_ENERGY_PERF_POLICY_ON_BAT=balance_power
          CPU_BOOST_ON_AC=1
          CPU_HWP_DYN_BOOST_ON_AC=1
          SATA_LINKPWR_ON_AC=min_power
          AHCI_RUNTIME_PM_ON_AC=auto
          AHCI_RUNTIME_PM_TIMEOUT=15
          PCIE_ASPM_ON_AC=auto
          WIFI_PWR_OFF_ON_AC=1
          RUNTIME_PM_ON_AC=auto
          USB_AUTOSUSPEND=1
      notify: Restart TLP
      tags:
        - power

    - name: Create powertop auto-tune service
      ansible.builtin.copy:
        dest: /etc/systemd/system/powertop-auto-tune.service
        mode: "0644"
        content: |
          [Unit]
          Description=Powertop auto-tune
          After=multi-user.target

          [Service]
          Type=oneshot
          ExecStart=/usr/sbin/powertop --auto-tune
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target
      notify: Reload systemd and restart powertop
      tags:
        - power

    - name: Create power-tuning service
      ansible.builtin.copy:
        dest: /etc/systemd/system/power-tuning.service
        mode: "0644"
        content: |
          [Unit]
          Description=Apply power tuning settings
          After=multi-user.target tlp.service
          Requires=tlp.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStartPre=/bin/sleep 2
          ExecStart=/usr/sbin/rfkill block wifi
          ExecStart=/bin/sh -c 'for h in /sys/class/scsi_host/host*/link_power_management_policy; do echo min_power > $h 2>/dev/null || true; done'
          ExecStart=/usr/sbin/hdparm -S 120 /dev/sda
          ExecStart=/usr/sbin/hdparm -S 120 /dev/sdb
          ExecStart=/usr/sbin/hdparm -S 120 /dev/sdc
          ExecStart=/usr/sbin/hdparm -S 120 /dev/sdd
          ExecStart=/usr/sbin/hdparm -S 120 /dev/sde

          [Install]
          WantedBy=multi-user.target
      notify: Reload systemd and restart power-tuning
      tags:
        - power

    - name: Enable power management services
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: started
      loop:
        - tlp
        - powertop-auto-tune
        - power-tuning
      tags:
        - power

    - name: Disable Postfix service
      ansible.builtin.systemd:
        name: postfix
        enabled: false
        state: stopped
      failed_when: false
      tags:
        - power

    - name: Configure kernel cmdline for ASPM
      ansible.builtin.copy:
        dest: /etc/kernel/cmdline
        mode: "0644"
        content: |
          root=ZFS=rpool/ROOT/pve-1 boot=zfs quiet amd_iommu=on iommu=pt pcie_aspm=force video=efifb=off
      notify: Refresh Proxmox boot
      tags:
        - power
        - aspm

  handlers:
    - name: Re-export NFS shares
      ansible.builtin.command:
        cmd: exportfs -ra
      changed_when: true

    - name: Reload sysctl
      ansible.builtin.command:
        cmd: sysctl --system
      changed_when: true
      tags:
        - exit-node
        - tailscale

    - name: Restart TLP
      ansible.builtin.systemd:
        name: tlp
        state: restarted
      tags:
        - power

    - name: Reload systemd and restart powertop
      ansible.builtin.systemd:
        name: powertop-auto-tune
        state: restarted
        daemon_reload: true
      tags:
        - power

    - name: Reload systemd and restart power-tuning
      ansible.builtin.systemd:
        name: power-tuning
        state: restarted
        daemon_reload: true
      tags:
        - power

    - name: Refresh Proxmox boot
      ansible.builtin.command:
        cmd: proxmox-boot-tool refresh
      changed_when: true
      tags:
        - power
        - aspm
