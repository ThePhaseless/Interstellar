- name: Configure Proxmox NFS Server
  hosts: proxmox
  become: true
  vars_files:
    - vars/proxmox.yaml
  tasks:
    - name: Enable kernel forwarding for Tailscale exit-node traffic
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-tailscale-exit-node.conf
        mode: "0644"
        content: |
          net.ipv4.ip_forward = 1
          net.ipv6.conf.all.forwarding = 1
      notify: Reload sysctl
      tags:
        - exit-node
        - tailscale

    - name: Install NFS kernel server
      ansible.builtin.apt:
        name: nfs-kernel-server
        state: present
        update_cache: true

    - name: Ensure export directories exist
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        mode: "0755"
      loop: "{{ nfs_exports }}"

    - name: Ensure managed media paths exist with shared ownership
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ media_runtime_uid | string }}"
        group: "{{ media_runtime_gid | string }}"
        mode: "2775"
      loop: "{{ media_managed_paths }}"

    - name: Normalize media directory ownership and setgid permissions
      ansible.builtin.shell: |
        MARKER="/var/cache/ansible-media-normalized"

        if [ -f "$MARKER" ]; then
          # Fast path: only scan directories modified since last normalization
          find "{{ item }}" -xdev -type d -newer "$MARKER" \
            \( ! -uid {{ media_runtime_uid }} -o ! -gid {{ media_runtime_gid }} -o ! -perm -2775 \) \
            -print0 | xargs -0 -r -n 100 chown {{ media_runtime_uid }}:{{ media_runtime_gid }}
          find "{{ item }}" -xdev -type d -newer "$MARKER" ! -perm -2775 \
            -print0 | xargs -0 -r -n 100 chmod 2775
        else
          # First run: full scan
          find "{{ item }}" -xdev -type d \
            \( ! -uid {{ media_runtime_uid }} -o ! -gid {{ media_runtime_gid }} -o ! -perm -2775 \) \
            -print0 | xargs -0 -r -n 100 chown {{ media_runtime_uid }}:{{ media_runtime_gid }}
          find "{{ item }}" -xdev -type d ! -perm -2775 \
            -print0 | xargs -0 -r -n 100 chmod 2775
        fi

        touch "$MARKER"
      args:
        executable: /bin/bash
      changed_when: false # idempotent: chown/chmod are no-ops on already-correct files
      loop: "{{ media_managed_paths }}"

    - name: Configure NFS exports
      ansible.builtin.lineinfile:
        path: /etc/exports
        regexp: "^{{ item.path | regex_escape }}\\s"
        line: "{{ item.path }} {{ nfs_allowed_hosts | map('regex_replace', '$', '(rw,sync,no_subtree_check,no_root_squash)') | join(' ') }}"
        state: present
      loop: "{{ nfs_exports }}"
      notify: Re-export NFS shares

    - name: Enable and start NFS server
      ansible.builtin.systemd:
        name: nfs-kernel-server
        enabled: true
        state: started

    # -- Health checks --
    - name: Flush handlers before health checks
      ansible.builtin.meta: flush_handlers

    - name: Verify NFS server is running
      ansible.builtin.systemd:
        name: nfs-kernel-server
      register: nfs_service
      failed_when: nfs_service.status.ActiveState != "active"

    - name: Verify NFS exports are active
      ansible.builtin.command:
        cmd: exportfs -v
      register: exportfs_output
      changed_when: false
      failed_when: item.path not in exportfs_output.stdout
      loop: "{{ nfs_exports }}"

    - name: Test NFS shares are mountable
      ansible.posix.mount:
        path: "/mnt/nfs-test-{{ idx }}"
        src: "127.0.0.1:{{ item.path }}"
        fstype: nfs
        opts: nfsvers=4.2,noatime
        state: mounted
      loop: "{{ nfs_exports }}"
      loop_control:
        index_var: idx

    - name: Verify test mounts have content access
      ansible.builtin.command:
        cmd: "ls /mnt/nfs-test-{{ idx }}"
      register: mount_ls
      changed_when: false
      loop: "{{ nfs_exports }}"
      loop_control:
        index_var: idx

    - name: Unmount test shares
      ansible.posix.mount:
        path: "/mnt/nfs-test-{{ idx }}"
        state: absent
      loop: "{{ nfs_exports }}"
      loop_control:
        index_var: idx

    - name: Report NFS health
      ansible.builtin.debug:
        msg: >-
          NFS health check passed:
          service={{ nfs_service.status.ActiveState }},
          exports={{ nfs_exports | map(attribute='path') | list | join(', ') }},
          mounts=ok

    # -- Power management --
    - name: Install power management packages
      ansible.builtin.apt:
        name:
          - tlp
          - linux-cpupower
          - powertop
          - hdparm
          - hd-idle
          - rfkill
        state: present
        update_cache: true
      tags:
        - power

    - name: Configure TLP for server
      ansible.builtin.copy:
        dest: /etc/tlp.d/99-server.conf
        mode: "0644"
        content: |
          CPU_ENERGY_PERF_POLICY_ON_AC=balance_power
          CPU_BOOST_ON_AC=0
          CPU_ENERGY_PERF_POLICY_ON_BAT=balance_power
          SATA_LINKPWR_ON_AC=min_power
          AHCI_RUNTIME_PM_ON_AC=auto
          AHCI_RUNTIME_PM_TIMEOUT=15
          WIFI_PWR_OFF_ON_AC=1
          RUNTIME_PM_ON_AC=auto
          USB_AUTOSUSPEND=1
      notify: Restart TLP
      tags:
        - power

    - name: Create powertop auto-tune service
      ansible.builtin.copy:
        dest: /etc/systemd/system/powertop-auto-tune.service
        mode: "0644"
        content: |
          [Unit]
          Description=Powertop auto-tune
          After=multi-user.target

          [Service]
          Type=oneshot
          ExecStart=/usr/sbin/powertop --auto-tune
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target
      notify: Reload systemd and restart powertop
      tags:
        - power

    - name: Configure hd-idle to spin down idle HDDs
      ansible.builtin.copy:
        dest: /etc/default/hd-idle
        mode: "0644"
        content: |
          # defaults file for hd-idle
          START_HD_IDLE=true
          # Spin down all SATA disks after 10 minutes of inactivity (use -c ata for SATA, not -c scsi).
          HD_IDLE_OPTS="-i 600 -c ata"
      notify: Restart hd-idle
      tags:
        - power

    - name: Stop KVM from spin-polling idle vCPUs
      ansible.builtin.copy:
        dest: /etc/modprobe.d/kvm.conf
        mode: "0644"
        content: |
          # Reduce idle power: stop KVM from spin-polling vCPUs when VMs are idle.
          options kvm halt_poll_ns=0
      tags:
        - power

    - name: Apply halt_poll_ns tuning live
      ansible.builtin.command:
        cmd: sh -c 'echo 0 > /sys/module/kvm/parameters/halt_poll_ns'
      changed_when: false
      tags:
        - power

    - name: Disable unused USB devices for power
      ansible.builtin.copy:
        dest: /etc/udev/rules.d/99-power-usb-unbind.rules
        mode: "0644"
        content: |
          # MSI MYSTIC LIGHT RGB controller (no RGB daemon running)
          ACTION=="add", ATTR{idVendor}=="1462", ATTR{idProduct}=="7c37", RUN+="/bin/sh -c 'echo $kernel > /sys$DEVPATH/driver/unbind'"
          # NOTE: CH340 (1a86:7523) is intentionally NOT unbound — it is the
          # Zigbee coordinator passed through to the Home Assistant VM (usb0 mapping=Zigbee).
      tags:
        - power

    - name: Power off unused nic0 (1GbE RTL8168, no carrier)
      ansible.builtin.copy:
        dest: /etc/udev/rules.d/99-power-nic0.rules
        mode: "0644"
        content: |
          # nic0 is unused (DOWN, no carrier) — unbind r8169 driver to allow PCI runtime PM
          ACTION=="add", SUBSYSTEM=="pci", ATTR{vendor}=="0x10ec", ATTR{device}=="0x8168", RUN+="/bin/sh -c 'echo $kernel > /sys/bus/pci/drivers/r8169/unbind'"
      tags:
        - power

    - name: Enable power management services
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: started
      loop:
        - tlp
        - powertop-auto-tune
        - hd-idle
      tags:
        - power

    - name: Disable Postfix service
      ansible.builtin.systemd:
        name: postfix
        enabled: false
        state: stopped
      failed_when: false
      tags:
        - power

    - name: Ensure smartmontools daemon is running for boot drives
      ansible.builtin.systemd:
        name: smartmontools
        enabled: true
        state: started
      failed_when: false
      tags:
        - power
        - disks

    - name: Configure kernel cmdline for ASPM
      ansible.builtin.copy:
        dest: /etc/kernel/cmdline
        mode: "0644"
        content: |
          root=ZFS=rpool/ROOT/pve-1 boot=zfs quiet amd_iommu=on iommu=pt pcie_aspm=force video=efifb=off
      notify: Refresh Proxmox boot
      tags:
        - power
        - aspm

    - name: Disable atime on Storage pool (stop reads from writing)
      ansible.builtin.command:
        cmd: zfs set atime=off Storage
      changed_when: false # idempotent: zfs set is a no-op if already set
      tags:
        - power

    - name: Configure ZFS module parameters for power and memory
      ansible.builtin.copy:
        dest: /etc/modprobe.d/zfs.conf
        mode: "0644"
        content: |
          # Increase txg timeout from 5s default to 30s to allow HDD spindown.
          # Up to 30s of writes at risk on crash; ZFS is crash-consistent (no corruption).
          options zfs zfs_txg_timeout=30
          # Limit ARC to 4 GiB to reduce host memory pressure and metadata churn.
          options zfs zfs_arc_max=4294967296
      notify: Update initramfs and refresh Proxmox boot
      tags:
        - power

    - name: Apply zfs_txg_timeout live
      ansible.builtin.command:
        cmd: sh -c 'echo 30 > /sys/module/zfs/parameters/zfs_txg_timeout'
      changed_when: false
      tags:
        - power

    - name: Apply zfs_arc_max live
      ansible.builtin.command:
        cmd: sh -c 'echo 4294967296 > /sys/module/zfs/parameters/zfs_arc_max'
      changed_when: false
      tags:
        - power

  handlers:
    - name: Re-export NFS shares
      ansible.builtin.command:
        cmd: exportfs -ra
      changed_when: true

    - name: Reload sysctl
      ansible.builtin.command:
        cmd: sysctl --system
      changed_when: true
      tags:
        - exit-node
        - tailscale

    - name: Restart TLP
      ansible.builtin.systemd:
        name: tlp
        state: restarted
      tags:
        - power

    - name: Reload systemd and restart powertop
      ansible.builtin.systemd:
        name: powertop-auto-tune
        state: restarted
        daemon_reload: true
      tags:
        - power

    - name: Restart hd-idle
      ansible.builtin.systemd:
        name: hd-idle
        state: restarted
      tags:
        - power

    - name: Refresh Proxmox boot
      ansible.builtin.command:
        cmd: proxmox-boot-tool refresh
      changed_when: true
      tags:
        - power
        - aspm

    - name: Update initramfs and refresh Proxmox boot
      ansible.builtin.command:
        cmd: sh -c 'update-initramfs -u && proxmox-boot-tool refresh'
      changed_when: true
      tags:
        - power
