apiVersion: apps/v1
kind: Deployment
metadata:
  name: crowdsec-lapi
  namespace: crowdsec
  labels:
    app: crowdsec-lapi
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: crowdsec-lapi
  template:
    metadata:
      labels:
        app: crowdsec-lapi
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "6060"
    spec:
      containers:
        - name: crowdsec
          image: crowdsecurity/crowdsec:v1.7.7@sha256:6ca53ad26196ca59ddd4fa692a586b73d8fcde085046163b9ca2f04887dca563
          env:
            - name: COLLECTIONS
              value: "crowdsecurity/traefik crowdsecurity/http-cve crowdsecurity/linux LePresidente/jellyfin"
            - name: DISABLE_AGENT
              value: "true"
            - name: BOUNCER_KEY_traefik
              valueFrom:
                secretKeyRef:
                  name: crowdsec-secrets
                  key: bouncer-key
                  optional: true
          ports:
            - name: lapi
              containerPort: 8080
            - name: metrics
              containerPort: 6060
          volumeMounts:
            - name: data
              mountPath: /var/lib/crowdsec/data
            - name: config
              mountPath: /etc/crowdsec
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: lapi
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: lapi
            initialDelaySeconds: 10
            periodSeconds: 5

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: crowdsec-data
        - name: config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: crowdsec-lapi
  namespace: crowdsec
spec:
  type: ClusterIP
  ports:
    - name: lapi
      port: 8080
      targetPort: lapi
  selector:
    app: crowdsec-lapi
