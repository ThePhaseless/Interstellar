apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: crowdsec

resources:
  - namespace.yaml
  - externalsecret.yaml

helmCharts:
  - name: crowdsec
    repo: https://crowdsecurity.github.io/helm-charts
    version: 0.24.0
    releaseName: crowdsec
    namespace: crowdsec
    includeCRDs: true
    valuesFile: values.yaml
