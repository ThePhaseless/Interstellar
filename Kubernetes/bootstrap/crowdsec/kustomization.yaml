apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: crowdsec

resources:
  - namespace.yaml
  - externalsecret.yaml

helmCharts:
  - name: crowdsec
    repo: https://crowdsecurity.github.io/helm-charts
    version: 0.24.0
    releaseName: crowdsec
    namespace: crowdsec
    includeCRDs: true
    valuesFile: values.yaml

# CrowdSec chart omits metadata.namespace — kustomize namespace transformer
# doesn't apply to Helm output in v5.8.1, so add namespace via patches.
patches:
  - target:
      kind: Deployment
    patch: |-
      - op: add
        path: /metadata/namespace
        value: crowdsec
  - target:
      kind: DaemonSet
    patch: |-
      - op: add
        path: /metadata/namespace
        value: crowdsec
  - target:
      kind: Service
    patch: |-
      - op: add
        path: /metadata/namespace
        value: crowdsec
  - target:
      kind: PersistentVolumeClaim
    patch: |-
      - op: add
        path: /metadata/namespace
        value: crowdsec
  - target:
      kind: ConfigMap
    patch: |-
      - op: add
        path: /metadata/namespace
        value: crowdsec
  - target:
      kind: Secret
    patch: |-
      - op: add
        path: /metadata/namespace
        value: crowdsec