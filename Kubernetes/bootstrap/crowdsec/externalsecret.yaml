apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: crowdsec-secrets
  namespace: crowdsec
spec:
  secretStoreRef:
    name: bitwarden-store-generated
    kind: ClusterSecretStore
  target:
    name: crowdsec-secrets
    creationPolicy: Owner
  data:
    - secretKey: bouncer-key
      remoteRef:
        key: crowdsec-api-key
