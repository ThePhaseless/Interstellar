apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
  - name: coredns
    namespace: kube-system
    files:
      - Corefile=config/Corefile
    options:
      disableNameSuffixHash: true
  - name: coredns-custom
    namespace: kube-system
    files:
      - hairpin-nat.override=config/hairpin-nat.override
    options:
      disableNameSuffixHash: true
