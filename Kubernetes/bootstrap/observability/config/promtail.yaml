server:
  http_listen_port: 3101
  grpc_listen_port: 0

positions:
  filename: /run/promtail/positions.yaml

clients:
  - url: http://loki.observability.svc.cluster.local:3100/loki/api/v1/push

scrape_configs:
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
    relabel_configs:
      - source_labels:
          - __meta_kubernetes_pod_controller_name
        regex: ([0-9a-z-.]+?)(-[0-9a-f]{8,10})?
        target_label: __tmp_controller_name
        action: replace
      - source_labels:
          - __meta_kubernetes_pod_label_app_kubernetes_io_name
          - __meta_kubernetes_pod_label_app
          - __tmp_controller_name
          - __meta_kubernetes_pod_name
        regex: ^;*([^;]+)(;.*)?$
        target_label: app
        action: replace
      - source_labels:
          - __meta_kubernetes_pod_node_name
        target_label: node_name
        action: replace
      - source_labels:
          - __meta_kubernetes_namespace
        target_label: namespace
        action: replace
      - source_labels:
          - __meta_kubernetes_pod_name
        target_label: pod
        action: replace
      - source_labels:
          - __meta_kubernetes_pod_container_name
        target_label: container
        action: replace
      - replacement: /var/log/pods/*$1/*.log
        separator: /
        source_labels:
          - __meta_kubernetes_pod_uid
          - __meta_kubernetes_pod_container_name
        target_label: __path__
        action: replace
    pipeline_stages:
      - cri: {}

      # Traefik access log enrichment (GeoIP + client IP label)
      - match:
          selector: '{namespace="traefik", container="traefik"}'
          stages:
            - json:
                expressions:
                  client_addr: ClientAddr
            - regex:
                expression: "^(?P<client_ip>[^:]+)"
                source: client_addr
            - geoip:
                db: /geoip/db.mmdb
                source: client_ip
                db_type: city
            - labeldrop:
                - geoip_city_name
                - geoip_continent_code
                - geoip_continent_name
                - geoip_location_latitude
                - geoip_location_longitude
                - geoip_subdivision_name
            - labels:
                geoip_country_name:
                client_ip:

      # Talos kernel log shipper. /dev/kmsg lines look like:
      #   "<level>,<seq>,<timestamp_us>,<flags>;<message>"
      # We extract only the level (0=emerg .. 7=debug) as a Loki label so
      # Grafana can filter on {kmsg_level="0|1|2|3"} for emergencies and
      # {kmsg_level="4|5|6|7"} for warnings+info. The raw line is kept
      # as the log content for full-text search.
      - match:
          selector: '{app="talos-kmsg-shipper"}'
          stages:
            - regex:
                expression: '^(?P<kmsg_level>\d+),'
            - labels:
                kmsg_level:

      # Generic JSON log level extraction for all pods.
      # Promotes the log level (from `level`, `lvl`, or `severity` fields) as
      # a Loki label so logs can be filtered with {log_level="error"} etc.
      # The raw log line is NOT replaced – structured JSON can be parsed at
      # query time in Loki with `| json | line_format "{{.msg}}"`.
      - match:
          selector: '{namespace=~".+"}'
          stages:
            - json:
                expressions:
                  _level: level
                  _lvl: lvl
                  _severity: severity
            - template:
                source: log_level
                template: >-
                  {{- if ._level }}{{ ._level | ToLower }}
                  {{- else if ._lvl }}{{ ._lvl | ToLower }}
                  {{- else if ._severity }}
                    {{- if eq ._severity "0" }}emerg
                    {{- else if eq ._severity "1" }}alert
                    {{- else if eq ._severity "2" }}crit
                    {{- else if eq ._severity "3" }}error
                    {{- else if eq ._severity "4" }}warn
                    {{- else if eq ._severity "5" }}info
                    {{- else if eq ._severity "6" }}info
                    {{- else if eq ._severity "7" }}debug
                    {{- else }}{{ ._severity | ToLower }}
                    {{- end }}
                  {{- end -}}
            - labels:
                log_level:

  # Talos control-plane static pods are present on disk under /var/log/pods,
  # but they are not reliably discovered by the generic kubernetes_sd job.
  # Scrape them explicitly so Loki can alert on control-plane failures.
  - job_name: kube-system-static-pods
    static_configs:
      - targets: [localhost]
        labels:
          app: kube-apiserver
          component: kube-apiserver
          container: kube-apiserver
          job: kube-system-static-pods
          namespace: kube-system
          pod: kube-apiserver
          __path__: /var/log/pods/kube-system_kube-apiserver-*/*/*.log
      - targets: [localhost]
        labels:
          app: kube-controller-manager
          component: kube-controller-manager
          container: kube-controller-manager
          job: kube-system-static-pods
          namespace: kube-system
          pod: kube-controller-manager
          __path__: /var/log/pods/kube-system_kube-controller-manager-*/*/*.log
      - targets: [localhost]
        labels:
          app: kube-scheduler
          component: kube-scheduler
          container: kube-scheduler
          job: kube-system-static-pods
          namespace: kube-system
          pod: kube-scheduler
          __path__: /var/log/pods/kube-system_kube-scheduler-*/*/*.log
    pipeline_stages:
      - cri: {}
