apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: observability

helmCharts:
  - name: prometheus-node-exporter
    repo: https://prometheus-community.github.io/helm-charts
    version: 4.56.1
    releaseName: node-exporter
    namespace: observability
    valuesFile: config/node-exporter-values.yaml

resources:
  - namespace.yaml
  - grafana.yaml
  - grafana-pvc.yaml
  - loki.yaml
  - loki-pvc.yaml
  - mimir.yaml
  - mimir-pvc.yaml
  - promtail.yaml
  - talos-dmesg-shipper.yaml
  - alloy.yaml
  - kube-state-metrics.yaml
  - externalsecret.yaml
  - backup-externalsecret.yaml
  - backup-cronjob.yaml

configMapGenerator:
  - name: grafana-dashboard-cluster
    files:
      - dashboards/cluster-overview.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana-dashboard: "true"
  - name: grafana-dashboard-traefik
    files:
      - dashboards/traefik.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana-dashboard: "true"
  - name: grafana-dashboard-media
    files:
      - dashboards/media-stack.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana-dashboard: "true"
  - name: grafana-dashboard-logs
    files:
      - dashboards/logs-explorer.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana-dashboard: "true"
  - name: grafana-dashboard-geo
    files:
      - dashboards/geo-heatmap.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana-dashboard: "true"
  - name: grafana-dashboard-access
    files:
      - dashboards/ip-analytics.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana-dashboard: "true"
  - name: grafana-dashboard-longhorn
    files:
      - dashboards/longhorn.json
    options:
      disableNameSuffixHash: true
      labels:
        grafana-dashboard: "true"
  - name: loki-config
    files:
      - config/loki.yaml
    options:
      disableNameSuffixHash: true
  - name: mimir-config
    files:
      - config/mimir.yaml
    options:
      disableNameSuffixHash: true
  - name: alloy-config
    files:
      - config.alloy=config/alloy.alloy
    options:
      disableNameSuffixHash: true
  - name: promtail-config
    files:
      - config/promtail.yaml
    options:
      disableNameSuffixHash: true
  - name: grafana-datasources
    files:
      - datasources.yaml=config/grafana-datasources.yaml
    options:
      disableNameSuffixHash: true
  - name: grafana-dashboards-provisioning
    files:
      - dashboards.yaml=config/grafana-dashboards-provisioning.yaml
    options:
      disableNameSuffixHash: true
  - name: grafana-alerting
    files:
      - alerting.yaml=config/grafana-alerting.yaml
    options:
      disableNameSuffixHash: true
  - name: observability-backup-script
    files:
      - scripts/borg-backup.sh
    options:
      disableNameSuffixHash: true
