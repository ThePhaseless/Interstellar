apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-secrets
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-store-generated
    kind: ClusterSecretStore
  target:
    name: authentik-secrets
    creationPolicy: Owner
  data:
    - secretKey: authentik-secret-key
      remoteRef:
        key: authentik-secret-key
    - secretKey: authentik-postgresql-password
      remoteRef:
        key: authentik-postgresql-password
    - secretKey: authentik-bootstrap-token
      remoteRef:
        key: authentik-bootstrap-token
---
# Google OAuth secrets live in the main "Interstellar" Bitwarden project
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: authentik-secrets-oauth
  namespace: authentik
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-store
    kind: ClusterSecretStore
  target:
    name: authentik-google-oauth
    creationPolicy: Owner
  data:
    - secretKey: google-oauth-client-id
      remoteRef:
        key: google-oauth-client-id
    - secretKey: google-oauth-client-secret
      remoteRef:
        key: google-oauth-client-secret
