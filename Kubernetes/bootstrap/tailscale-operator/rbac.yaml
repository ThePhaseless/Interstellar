---
# Grants cluster-admin to users in the Tailscale 'group:vips' group.
# Membership is managed via Tailscale/policy.hujson — add users there, not here.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tailscale-vips-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: Group
    name: "group:vips"
    apiGroup: rbac.authorization.k8s.io
