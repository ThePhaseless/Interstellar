api:
  dashboard: true
  insecure: false

experimental:
  plugins:
    crowdsec-bouncer:
      moduleName: github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
      version: v1.5.0

# Ping for health checks
ping:
  entryPoint: traefik

entryPoints:
  web:
    address: ":80"
    # PROXY Protocol from Oracle HAProxy
    proxyProtocol:
      trustedIPs:
        - "100.64.0.0/10" # Tailscale CGNAT range
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    # PROXY Protocol from Oracle HAProxy
    proxyProtocol:
      trustedIPs:
        - "100.64.0.0/10" # Tailscale CGNAT range
    http:
      tls:
        certResolver: letsencrypt
        domains:
          - main: "nerine.dev"
            sans:
              - "*.nerine.dev"
      # Global middlewares applied to all routes
      middlewares:
        - traefik-security-headers@kubernetescrd

  traefik:
    address: ":8080"

certificatesResolvers:
  letsencrypt:
    acme:
      email: admin@nerine.dev
      storage: /data/acme.json
      dnsChallenge:
        provider: cloudflare
        delayBeforeCheck: 10s
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"

providers:
  kubernetesCRD:
    allowCrossNamespace: true
    allowExternalNameServices: true

  kubernetesIngress:
    allowExternalNameServices: true

log:
  level: INFO
  format: json

# Access Logging (all requests — needed for geo heatmap analytics)
accessLog:
  format: json

# Metrics (for Mimir/Prometheus)
metrics:
  prometheus:
    entryPoint: traefik
    addEntryPointsLabels: true
    addRoutersLabels: true
    addServicesLabels: true

global:
  checkNewVersion: false
  sendAnonymousUsage: false
