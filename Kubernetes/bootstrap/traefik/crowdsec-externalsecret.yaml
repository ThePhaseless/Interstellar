apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: crowdsec-bouncer-key
  namespace: traefik
spec:
  secretStoreRef:
    name: bitwarden-store-generated
    kind: ClusterSecretStore
  target:
    name: crowdsec-bouncer-key
    creationPolicy: Owner
  data:
    - secretKey: crowdsecLapiKey
      remoteRef:
        key: crowdsec-api-key
