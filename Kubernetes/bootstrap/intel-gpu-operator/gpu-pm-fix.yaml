apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gpu-pm-fix
  namespace: intel-device-plugins
  labels:
    app: gpu-pm-fix
spec:
  selector:
    matchLabels:
      app: gpu-pm-fix
  template:
    metadata:
      labels:
        app: gpu-pm-fix
    spec:
      nodeSelector:
        intel.feature.node.kubernetes.io/gpu: "true"
      initContainers:
        - name: fixer
          image: alpine:latest
          command:
            - sh
            - -c
            - echo on > /sys/bus/pci/devices/0000:01:00.0/power/control
          securityContext:
            privileged: true
      containers:
        - name: keeper
          image: alpine:latest
          command:
            - sh
            - -c
            - |
              while true; do
                cur=$(cat /sys/bus/pci/devices/0000:01:00.0/power/control 2>/dev/null)
                if [ "$cur" != "on" ]; then
                  echo on > /sys/bus/pci/devices/0000:01:00.0/power/control
                  echo "$(date) Fixed power/control (was $cur)"
                fi
                sleep 60
              done
          securityContext:
            privileged: true
