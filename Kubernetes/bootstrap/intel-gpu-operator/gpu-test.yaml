apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-test
  namespace: intel-device-plugins
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      nodeSelector:
        intel.feature.node.kubernetes.io/gpu: "true"
      containers:
        - name: gpu-test
          image: busybox:1.37@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
          command:
            - /bin/sh
            - -c
            - |
              echo "Intel GPU test"
              echo "/dev/dri devices"
              ls -la /dev/dri/
              echo "GPU render nodes"
              for f in /dev/dri/render*; do
                echo "Found render node: $f"
              done
              echo "GPU test complete"
          resources:
            requests:
              gpu.intel.com/xe: "1"
            limits:
              gpu.intel.com/xe: "1"
