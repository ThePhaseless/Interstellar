apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: bitwarden-store-generated
spec:
  provider:
    bitwardensecretsmanager:
      apiURL: https://api.bitwarden.com
      identityURL: https://identity.bitwarden.com
      bitwardenServerSDKURL: https://bitwarden-sdk-server.external-secrets.svc.cluster.local:9998
      # CA certificate for the SDK server TLS connection
      caProvider:
        type: Secret
        name: bitwarden-tls-certs
        namespace: external-secrets
        key: ca.crt
      organizationID: e26bc154-3f78-46d9-8e3a-b48b01745df7
      projectID: 71ccd9ca-3971-42c3-a074-b48b0176ebc6
      auth:
        secretRef:
          credentials:
            name: bitwarden-access-token-kubernetes
            namespace: external-secrets
            key: token
