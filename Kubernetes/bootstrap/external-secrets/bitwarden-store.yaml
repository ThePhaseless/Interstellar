apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: bitwarden-store
spec:
  provider:
    bitwardensecretsmanager:
      apiURL: https://api.bitwarden.com
      identityURL: https://identity.bitwarden.com
      bitwardenServerSDKURL: https://bitwarden-sdk-server.external-secrets.svc.cluster.local:9998
      caProvider:
        type: Secret
        name: bitwarden-tls-certs
        namespace: external-secrets
        key: ca.crt
      organizationID: e26bc154-3f78-46d9-8e3a-b48b01745df7
      # "Interstellar" project — manually managed secrets (cloudflare, google-oauth, etc.)
      projectID: 4757db61-9cc2-4f76-a60d-b48b0176caae
      auth:
        secretRef:
          credentials:
            name: bitwarden-access-token-kubernetes
            namespace: external-secrets
            key: token
