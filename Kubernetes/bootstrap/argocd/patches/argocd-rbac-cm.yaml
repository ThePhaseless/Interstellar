apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
data:
  # Default: read-only for any authenticated user
  policy.default: role:readonly
  # Use 'groups' claim (populated from Authentik via userinfo) for RBAC
  scopes: "[groups]"
  policy.csv: |
    # Authentik 'admins' group → ArgoCD admin role
    g, admins, role:admin
