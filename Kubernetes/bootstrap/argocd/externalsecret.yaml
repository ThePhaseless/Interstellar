# =============================================================================
# ArgoCD OIDC Client Secret — pulled from Bitwarden (Terraform-generated)
# =============================================================================
# The secret is labeled `app.kubernetes.io/part-of: argocd` so ArgoCD can
# reference it in argocd-cm as: $argocd-oidc-secret:oidc.authentik.clientSecret
# =============================================================================
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: argocd-oidc-secret
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-store-generated
    kind: ClusterSecretStore
  target:
    name: argocd-oidc-secret
    creationPolicy: Owner
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: argocd
  data:
    - secretKey: oidc.authentik.clientSecret
      remoteRef:
        key: authentik-argocd-client-secret
