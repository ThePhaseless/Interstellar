apiVersion: v1
kind: ServiceAccount
metadata:
  name: home-backup
  namespace: home
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: home-backup
  namespace: home
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: home-backup
  namespace: home
subjects:
  - kind: ServiceAccount
    name: home-backup
    namespace: home
roleRef:
  kind: Role
  name: home-backup
  apiGroup: rbac.authorization.k8s.io
