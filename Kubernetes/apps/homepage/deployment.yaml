# =============================================================================
# Homepage Deployment
# =============================================================================
# Minimal nginx serving a static landing page for nerine.dev
# ConfigMap is generated by kustomization.yaml from index.html, style.css, nginx.conf
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: utilities
  labels:
    app: homepage
spec:
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      containers:
        - name: nginx
          image: nginx:1.29-alpine
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
            - name: html
              mountPath: /usr/share/nginx/html/style.css
              subPath: style.css
            - name: html
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              cpu: 25m
              memory: 32Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: html
          configMap:
            name: homepage-html
