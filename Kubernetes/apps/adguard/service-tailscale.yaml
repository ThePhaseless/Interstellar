apiVersion: v1
kind: Service
metadata:
  name: adguard-tailscale
  namespace: home
  labels:
    app: adguard
  annotations:
    # Expose as shareable Tailscale node
    tailscale.com/expose: "true"
    tailscale.com/hostname: "adguard"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  # Preserve client Tailscale IPs for per-device stats
  externalTrafficPolicy: Local
  selector:
    app: adguard
  ports:
    - name: dns-udp
      port: 53
      targetPort: dns-udp
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: dns-tcp
    # HTTP API for Terraform management
    - name: http-api
      port: 3000
      targetPort: http
    # DoH for mobile/browser DNS
    - name: https
      port: 443
      targetPort: http
