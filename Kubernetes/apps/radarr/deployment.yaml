apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: media
  annotations:
    ignore-check.kube-linter.io/latest-tag: "bitnami/kubectl versioned tags are not currently published; keep latest for this helper sidecar."
    reloader.stakater.com/auto: "true"
  labels:
    app: radarr
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9708"
    spec:
      serviceAccountName: arr-configurator

      initContainers:
        - name: set-external-auth
          image: busybox:1.37
          command: ["/bin/sh", "-c"]
          args:
            - |
              CONFIG="/config/config.xml"
              if [ ! -f "$CONFIG" ]; then
                printf '<Config>\n  <AuthenticationMethod>External</AuthenticationMethod>\n  <AuthenticationRequired>DisabledForLocalAddresses</AuthenticationRequired>\n</Config>\n' > "$CONFIG"
                echo "Created config.xml with External auth"
              else
                sed -i 's|<AuthenticationMethod>[^<]*</AuthenticationMethod>|<AuthenticationMethod>External</AuthenticationMethod>|' "$CONFIG"
                sed -i 's|<AuthenticationRequired>[^<]*</AuthenticationRequired>|<AuthenticationRequired>DisabledForLocalAddresses</AuthenticationRequired>|' "$CONFIG"
                echo "Updated config.xml auth settings"
              fi
          volumeMounts:
            - name: config
              mountPath: /config

      containers:
        - name: radarr
          image: linuxserver/radarr:6.1.1
          envFrom:
            - configMapRef:
                name: media-runtime-config
          env:
            - name: TZ
              value: "UTC"
          ports:
            - name: http
              containerPort: 7878
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
            - name: media
              mountPath: /media
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10

        - name: api-extractor
          image: bitnami/kubectl:latest
          command:
            [
              "/bin/bash",
              "/scripts/extract-api-key.sh",
              "radarr",
              "/config/config.xml",
            ]
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi

        - name: exportarr
          image: ghcr.io/onedr0p/exportarr:v2.3.0
          args: ["radarr"]
          env:
            - name: PORT
              value: "9708"
            - name: URL
              value: "http://localhost:7878"
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: arr-api-keys
                  key: radarr-api-key
          ports:
            - name: metrics
              containerPort: 9708
          resources:
            requests:
              cpu: 5m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30

      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: radarr-config
        - name: scripts
          configMap:
            name: arr-scripts
            defaultMode: 0755
        - name: downloads
          persistentVolumeClaim:
            claimName: downloads-pvc
        - name: media
          persistentVolumeClaim:
            claimName: media-pvc
