# =============================================================================
# BorgBackup Kustomization
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: utilities

resources:
  - cronjob.yaml
  - externalsecret.yaml

configMapGenerator:
  - name: borgbackup-script
    namespace: utilities
    files:
      - scripts/backup.sh

labels:
  - pairs:
      app.kubernetes.io/name: borgbackup
    includeSelectors: true
