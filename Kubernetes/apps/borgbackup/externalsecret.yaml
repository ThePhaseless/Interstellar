# =============================================================================
# BorgBackup — ExternalSecret
# =============================================================================
# Pulls BorgBackup credentials from Bitwarden via ClusterSecretStore.
# These secrets are created by Terraform (hetzner.tf).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: borg-secrets
  namespace: utilities
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-store-generated
    kind: ClusterSecretStore
  target:
    name: borg-secrets
    creationPolicy: Owner
  data:
    - secretKey: ssh-private-key
      remoteRef:
        key: borg-ssh-private-key
    - secretKey: passphrase
      remoteRef:
        key: borg-passphrase
    - secretKey: repo-url
      remoteRef:
        key: borg-repo-url
    - secretKey: server-host
      remoteRef:
        key: borg-server-host
