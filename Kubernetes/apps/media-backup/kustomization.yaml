apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: media

resources:
  - cronjob.yaml
  - externalsecret.yaml
  - rbac.yaml

configMapGenerator:
  - name: media-backup-script
    namespace: media
    files:
      - scripts/borg-backup.sh
      - scripts/media-backup-orchestrator.sh
    options:
      disableNameSuffixHash: true

labels:
  - pairs:
      app.kubernetes.io/name: media-backup
    includeSelectors: true
