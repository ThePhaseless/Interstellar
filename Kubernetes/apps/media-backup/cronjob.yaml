apiVersion: batch/v1
kind: CronJob
metadata:
  name: media-backup
  namespace: media
spec:
  schedule: "0 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 120
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: borgbackup
              image: alpine:3.23
              command: ["/bin/sh", "/scripts/backup.sh"]
              env:
                - name: BORG_PASSPHRASE
                  valueFrom:
                    secretKeyRef:
                      name: borg-secrets
                      key: passphrase
                - name: BORG_REPO
                  valueFrom:
                    secretKeyRef:
                      name: borg-secrets
                      key: repo-url
                - name: BORG_SERVER_HOST
                  valueFrom:
                    secretKeyRef:
                      name: borg-secrets
                      key: server-host
              volumeMounts:
                - name: sonarr-config
                  mountPath: /sonarr
                  readOnly: true
                - name: radarr-config
                  mountPath: /radarr
                  readOnly: true
                - name: prowlarr-config
                  mountPath: /prowlarr
                  readOnly: true
                - name: bazarr-config
                  mountPath: /bazarr
                  readOnly: true
                - name: jellyfin-config
                  mountPath: /jellyfin
                  readOnly: true
                - name: qbittorrent-config
                  mountPath: /qbittorrent
                  readOnly: true
                - name: seerr-config
                  mountPath: /seerr
                  readOnly: true
                - name: borg-ssh-key
                  mountPath: /secrets/ssh
                  readOnly: true
                - name: backup-script
                  mountPath: /scripts
                  readOnly: true
                - name: borg-cache
                  mountPath: /root/.cache/borg
              resources:
                requests: { cpu: 200m, memory: 512Mi }
                limits: { cpu: 2000m, memory: 2Gi }
          volumes:
            - name: sonarr-config
              persistentVolumeClaim:
                claimName: sonarr-config
            - name: radarr-config
              persistentVolumeClaim:
                claimName: radarr-config
            - name: prowlarr-config
              persistentVolumeClaim:
                claimName: prowlarr-config
            - name: bazarr-config
              persistentVolumeClaim:
                claimName: bazarr-config
            - name: jellyfin-config
              persistentVolumeClaim:
                claimName: jellyfin-config
            - name: qbittorrent-config
              persistentVolumeClaim:
                claimName: qbittorrent-config
            - name: seerr-config
              persistentVolumeClaim:
                claimName: seerr-config
            - name: borg-ssh-key
              secret:
                secretName: borg-secrets
                items:
                  - key: ssh-private-key
                    path: id_ed25519
                    mode: 0600
                defaultMode: 0600
            - name: backup-script
              configMap:
                name: media-backup-script
                defaultMode: 0755
            - name: borg-cache
              emptyDir:
                sizeLimit: 2Gi
