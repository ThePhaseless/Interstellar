apiVersion: batch/v1
kind: CronJob
metadata:
  name: media-backup
  namespace: media
spec:
  schedule: "0 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 120
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: media-backup
          restartPolicy: Never
          containers:
            - name: orchestrator
              image: alpine:3.24
              command: ["/bin/sh", "/scripts/media-backup-orchestrator.sh"]
              env:
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: JOB_TIMEOUT_SECONDS
                  value: "7200"
              volumeMounts:
                - name: backup-script
                  mountPath: /scripts
                  readOnly: true
              resources:
                requests: { cpu: 100m, memory: 128Mi }
                limits: { cpu: 500m, memory: 512Mi }
          volumes:
            - name: backup-script
              configMap:
                name: media-backup-script
                defaultMode: 0755
