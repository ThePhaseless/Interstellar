[global]
# Web server settings
i: 0.0.0.0
p: 3923

# Reverse proxy mode - trust X-Forwarded-For from all sources (behind Traefik)
rproxy: 1

# IdP authentication (Authentik forward auth)
# Copyparty reads the user identity from headers injected by the reverse proxy.
# X-authentik-username → copyparty username
# X-authentik-groups   → comma-separated group names (→ volume ACLs use @admins, @writers)
# See https://github.com/9001/copyparty/blob/hovudstraum/docs/idp.md
# Local accounts (e.g. "guest") are used as fallback when no IdP header is present
# (i.e. direct WebDAV access via Tailscale — mount as drive with guest:guest).
auth-ord: idp
idp-h-usr: X-authentik-username
idp-h-grp: X-authentik-groups

# Trust IdP headers from any private/LAN IP (Traefik runs in-cluster)
xff-src: lan

# WebDAV settings - provides native file manager access
# Admin gets read-write via account permissions
daw

# Logging
lo: /dev/stdout

# Security
no-robots
no-logues

# Performance
j: 4
hist: 0

[accounts]
  guest: guest

[/personal]
  /personal
  accs:
    rwmda: @admins
    rw: guest

[/personal/public]
  /personal/public
  accs:
    r: *
    rw: guest
    rw: @writers
    rwmda: @admins

[/media]
  /media
  accs:
    rwmda: @admins
