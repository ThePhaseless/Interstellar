apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: media

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - pvc.yaml

configMapGenerator:
  - name: jellyfin-branding
    namespace: media
    files:
      - branding.xml

labels:
  - pairs:
      app: jellyfin
    includeSelectors: true
