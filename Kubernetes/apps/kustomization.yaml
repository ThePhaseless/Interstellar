# =============================================================================
# Applications Kustomization
# =============================================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Config
  - common/nfs-storage-config.yaml

  # Namespaces
  - namespaces.yaml

  # Common resources
  - common/

  # Media Stack
  - jellyfin/
  - seerr/
  - sonarr/
  - radarr/
  - prowlarr/
  - bazarr/
  - qbittorrent/
  - decluttarr/
  - recyclarr/
  - byparr/

  # Utilities
  - postfix/
  - copyparty/
  - immich/
  - mcpjungle/
  - adguard/
  - homepage/
  - whoami/

  # Backup
  - borgbackup/

replacements:
  - source:
      kind: ConfigMap
      name: nfs-storage-config
      fieldPath: data.server
    targets:
      - select:
          kind: PersistentVolume
          name: media-nfs-pv
        fieldPaths:
          - spec.nfs.server
      - select:
          kind: PersistentVolume
          name: media-nfs-pv-utilities
        fieldPaths:
          - spec.nfs.server
      - select:
          kind: PersistentVolume
          name: downloads-nfs-pv
        fieldPaths:
          - spec.nfs.server
      - select:
          kind: PersistentVolume
          name: personal-nfs-pv
        fieldPaths:
          - spec.nfs.server
      - select:
          kind: PersistentVolume
          name: photos-nfs-pv
        fieldPaths:
          - spec.nfs.server
