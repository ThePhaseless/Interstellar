apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: media
  labels:
    app: qbittorrent
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: qbittorrent
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      initContainers:
        - name: config-init
          image: linuxserver/qbittorrent:5.1.4
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              CONFIG_DIR="/config/qBittorrent"
              CONFIG_FILE="${CONFIG_DIR}/qBittorrent.conf"
              mkdir -p "${CONFIG_DIR}"
              if [ ! -f "${CONFIG_FILE}" ]; then
                cat > "${CONFIG_FILE}" <<'EOF'
              [Preferences]
              WebUI\Port=8080
              WebUI\AuthSubnetWhitelistEnabled=true
              WebUI\AuthSubnetWhitelist=0.0.0.0/0
              WebUI\CSRFProtection=false
              WebUI\HostHeaderValidation=false
              WebUI\LocalHostAuth=false
              WebUI\RootFolder=/vuetorrent
              EOF
                chmod 600 "${CONFIG_FILE}"
              fi
              # Idempotently ensure auth is bypassed for all IPs (auth handled by Traefik)
              for KEY in CSRFProtection HostHeaderValidation LocalHostAuth AuthSubnetWhitelistEnabled AuthSubnetWhitelist; do
                sed -i "/^WebUI\\\\${KEY}=/d" "${CONFIG_FILE}"
              done
              sed -i '/^\[Preferences\]/a WebUI\\LocalHostAuth=false\nWebUI\\HostHeaderValidation=false\nWebUI\\CSRFProtection=false\nWebUI\\AuthSubnetWhitelistEnabled=true\nWebUI\\AuthSubnetWhitelist=0.0.0.0\/0' "${CONFIG_FILE}"
              # Set download path to shared volume
              if ! grep -q '^\[BitTorrent\]' "${CONFIG_FILE}"; then
                printf '\n[BitTorrent]\nSession\\DefaultSavePath=/downloads\n' >> "${CONFIG_FILE}"
              elif ! grep -q 'DefaultSavePath' "${CONFIG_FILE}"; then
                sed -i '/^\[BitTorrent\]/a Session\\DefaultSavePath=/downloads' "${CONFIG_FILE}"
              else
                sed -i 's|Session\\DefaultSavePath=.*|Session\\DefaultSavePath=/downloads|' "${CONFIG_FILE}"
              fi

              # Reduce idle disk reads on the Storage pool by limiting active
              # seeding/checking torrents and stopping them after import.
              # Queueing must be enabled for MaxActive* limits to take effect.
              python3 - <<'PY'
              import configparser, os
              f = '/config/qBittorrent/qBittorrent.conf'
              cp = configparser.ConfigParser()
              cp.optionxform = str
              cp.read(f)
              if not cp.has_section('BitTorrent'):
                  cp.add_section('BitTorrent')
              updates = {
                  'Session\\QueueingSystemEnabled': 'true',
                  'Session\\GlobalMaxRatio': '2',
                  'Session\\GlobalMaxSeedingMinutes': '10080',
                  'Session\\ShareLimitAction': 'Stop',
              }
              changed = False
              for k, v in updates.items():
                  if cp.get('BitTorrent', k, fallback=None) != v:
                      cp.set('BitTorrent', k, v)
                      changed = True
              if changed:
                  with open(f, 'w') as fh:
                      cp.write(fh)
              PY
          volumeMounts:
            - name: config
              mountPath: /config
      containers:
        - name: qbittorrent
          image: linuxserver/qbittorrent:5.1.4
          envFrom:
            - configMapRef:
                name: media-runtime-config
          env:
            - name: TZ
              value: "UTC"
            - name: DOCKER_MODS
              value: ghcr.io/vuetorrent/vuetorrent-lsio-mod:latest
          ports:
            - name: http
              containerPort: 8080
            - name: bittorrent-tcp
              containerPort: 6881
            - name: bittorrent-udp
              containerPort: 6881
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10

      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: qbittorrent-config
        - name: downloads
          persistentVolumeClaim:
            claimName: downloads-pvc
