# =============================================================================
# Terraform CI/CD Workflow
# =============================================================================
# Runs Terraform plan on PRs and apply on main branch pushes.
# Uses Bitwarden Secrets Manager for all credentials.

name: Terraform-CI

on:
  push:
    branches: [main, migration]
    paths:
      - "Terraform/**"
      - ".github/workflows/terraform.yaml"
  pull_request:
    branches: [main, migration]
    paths:
      - "Terraform/**"
      - ".github/workflows/terraform.yaml"

env:
  TF_VERSION: "1.14.6"
  TF_WORKING_DIR: "./Terraform"
  GH_APP_ID: ""
  GH_APP_PRIVATE_KEY: ""

jobs:
  # ---------------------------------------------------------------------------
  # Terraform Plan (runs on all PRs and pushes)
  # ---------------------------------------------------------------------------
  plan:
    name: Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Secrets from Bitwarden
        uses: bitwarden/sm-action@v2
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          secrets: |
            ${{ vars.BWS_ID_OCI_CONFIG }} > OCI_CONFIG
            ${{ vars.BWS_ID_OCI_PRIVATE_KEY }} > OCI_PRIVATE_KEY
            ${{ vars.BWS_ID_OCI_NAMESPACE }} > OCI_NAMESPACE
            ${{ vars.BWS_ID_TS_OAUTH_CLIENT_ID }} > TS_OAUTH_CLIENT_ID
            ${{ vars.BWS_ID_TS_OAUTH_SECRET }} > TS_OAUTH_SECRET
            ${{ vars.BWS_ID_TS_CI_OAUTH_CLIENT_ID }} > TS_CI_OAUTH_CLIENT_ID
            ${{ vars.BWS_ID_TS_CI_OAUTH_SECRET }} > TS_CI_OAUTH_SECRET
            ${{ vars.BWS_ID_TF_STATE_BUCKET }} > TF_STATE_BUCKET
            ${{ vars.BWS_ID_PROXMOX_API_TOKEN }} > PROXMOX_API_TOKEN_VALUE
            ${{ vars.BWS_ID_HCLOUD_TOKEN }} > HCLOUD_TOKEN
            ${{ vars.BWS_ID_GH_APP_ID }} > GH_APP_ID
            ${{ vars.BWS_ID_GH_APP_PRIVATE_KEY }} > GH_APP_PRIVATE_KEY

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ env.GH_APP_ID }}
          private-key: ${{ env.GH_APP_PRIVATE_KEY }}

      - name: Install BWS CLI
        run: |
          curl -sSL https://github.com/bitwarden/sdk/releases/download/bws-v1.0.0/bws-x86_64-unknown-linux-gnu-1.0.0.zip -o bws.zip
          unzip -o bws.zip
          chmod +x bws
          sudo mv bws /usr/local/bin/

      # Fetch all secrets from Bitwarden (using IDs from GitHub variables)
      # Set Bitwarden provider environment variables
      - name: Set Provider Environment Variables
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
        run: |
          echo "BW_ACCESS_TOKEN=${{ secrets.BW_ACCESS_TOKEN }}" >> $GITHUB_ENV

          # Use variable if provided, otherwise fetch dynamically from BWS
          ORG_ID="${{ vars.BW_ORGANIZATION_ID }}"
          if [ -z "$ORG_ID" ]; then
            echo "BW_ORGANIZATION_ID not set, fetching from BWS..."
            ORG_ID=$(bws project list --output json --color no | tr -cd '[:print:]\t\n' | jq -r '.[0].organizationId // empty')
          fi

          if [ -n "$ORG_ID" ]; then
            echo "BW_ORGANIZATION_ID=$ORG_ID" >> $GITHUB_ENV
          else
            echo "::error::Could not determine Bitwarden Organization ID"
            exit 1
          fi

          echo "PROXMOX_VE_API_TOKEN=${{ secrets.PROXMOX_VE_API_TOKEN }}" >> $GITHUB_ENV
          echo "TF_VAR_bws_access_token=${{ secrets.BW_ACCESS_TOKEN }}" >> $GITHUB_ENV
          echo "TF_VAR_hcloud_token=$HCLOUD_TOKEN" >> $GITHUB_ENV

      # Connect to Tailscale for Proxmox access
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ env.TS_CI_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_CI_OAUTH_SECRET }}
          tags: tag:ci

      - name: Write OCI config
        shell: bash
        run: |
          mkdir -p "$HOME/.oci"

          # Ensure config ends with a newline before appending
          printf "%s" "$OCI_CONFIG" > "$HOME/.oci/config"
          [ -n "$(tail -c1 "$HOME/.oci/config")" ] && echo "" >> "$HOME/.oci/config"

          printf "%s" "$OCI_PRIVATE_KEY" > "$HOME/.oci/oci_api_key.pem"
          chmod 600 "$HOME/.oci/config" "$HOME/.oci/oci_api_key.pem"

          # Update or append key_file path
          if grep -q '^key_file=' "$HOME/.oci/config"; then
            sed -i "s|^key_file=.*|key_file=$HOME/.oci/oci_api_key.pem|" "$HOME/.oci/config"
          else
            echo "key_file=$HOME/.oci/oci_api_key.pem" >> "$HOME/.oci/config"
          fi

          # Export OCI credentials
          echo "OCI_CLI_CONFIG_FILE=$HOME/.oci/config" >> $GITHUB_ENV
          echo "OCI_CLI_KEY_FILE=$HOME/.oci/oci_api_key.pem" >> $GITHUB_ENV

          # Extract fields safely (handle potential whitespace/comments)
          echo "OCI_CLI_USER=$(grep '^user=' $HOME/.oci/config | head -1 | cut -d'=' -f2 | tr -d '[:space:]')" >> $GITHUB_ENV
          echo "OCI_CLI_TENANCY=$(grep '^tenancy=' $HOME/.oci/config | head -1 | cut -d'=' -f2 | tr -d '[:space:]')" >> $GITHUB_ENV
          echo "OCI_CLI_FINGERPRINT=$(grep '^fingerprint=' $HOME/.oci/config | head -1 | cut -d'=' -f2 | tr -d '[:space:]')" >> $GITHUB_ENV
          echo "OCI_CLI_REGION=$(grep '^region=' $HOME/.oci/config | head -1 | cut -d'=' -f2 | tr -d '[:space:]')" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        working-directory: ${{ env.TF_WORKING_DIR }}
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="namespace=${{ env.OCI_NAMESPACE }}"
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          BW_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
          BW_ORGANIZATION_ID: ${{ env.BW_ORGANIZATION_ID }}
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          BW_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
          BW_ORGANIZATION_ID: ${{ env.BW_ORGANIZATION_ID }}
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Terraform Plan
        id: plan
        run: |
          # Generate plan and capture output
          terraform plan -no-color -out=tfplan > plan_output.txt

          # Extract summary
          SUMMARY=$(grep -E "Plan:|No changes." plan_output.txt | tail -1)
          echo "plan_summary=$SUMMARY" >> $GITHUB_OUTPUT
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          BW_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
          BW_ORGANIZATION_ID: ${{ env.BW_ORGANIZATION_ID }}
          TF_VAR_bws_access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          TF_VAR_hcloud_token: ${{ env.TF_VAR_hcloud_token }}
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
        continue-on-error: true

      - name: Encrypt Plan
        if: steps.plan.outcome == 'success'
        run: |
          gpg --symmetric --batch --passphrase "${{ secrets.BW_ACCESS_TOKEN }}" tfplan
          rm -f plan_output.txt tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}

      # Post plan output to PR (Summary only for security)
      - name: Update Pull Request
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            **Summary:** \`${{ steps.plan.outputs.plan_summary }}\`

            > [!IMPORTANT]
            > Detailed plan output is hidden and encrypted for security because this is a public repository.

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      # Upload ENCRYPTED plan for apply job
      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan.gpg

  # ---------------------------------------------------------------------------
  # Terraform Apply (only on main branch)
  # ---------------------------------------------------------------------------
  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: server
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get Secrets from Bitwarden
        uses: bitwarden/sm-action@v2
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          secrets: |
            ${{ vars.BWS_ID_OCI_CONFIG }} > OCI_CONFIG
            ${{ vars.BWS_ID_OCI_PRIVATE_KEY }} > OCI_PRIVATE_KEY
            ${{ vars.BWS_ID_OCI_NAMESPACE }} > OCI_NAMESPACE
            ${{ vars.BWS_ID_TS_OAUTH_CLIENT_ID }} > TS_OAUTH_CLIENT_ID
            ${{ vars.BWS_ID_TS_OAUTH_SECRET }} > TS_OAUTH_SECRET
            ${{ vars.BWS_ID_TS_CI_OAUTH_CLIENT_ID }} > TS_CI_OAUTH_CLIENT_ID
            ${{ vars.BWS_ID_TS_CI_OAUTH_SECRET }} > TS_CI_OAUTH_SECRET
            ${{ vars.BWS_ID_TF_STATE_BUCKET }} > TF_STATE_BUCKET
            ${{ vars.BWS_ID_PROXMOX_API_TOKEN }} > PROXMOX_API_TOKEN_VALUE
            ${{ vars.BWS_ID_HCLOUD_TOKEN }} > HCLOUD_TOKEN
            ${{ vars.BWS_ID_GH_APP_ID }} > GH_APP_ID
            ${{ vars.BWS_ID_GH_APP_PRIVATE_KEY }} > GH_APP_PRIVATE_KEY

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ env.GH_APP_ID }}
          private-key: ${{ env.GH_APP_PRIVATE_KEY }}

      - name: Install BWS CLI
        run: |
          curl -sSL https://github.com/bitwarden/sdk/releases/download/bws-v1.0.0/bws-x86_64-unknown-linux-gnu-1.0.0.zip -o bws.zip
          unzip -o bws.zip
          chmod +x bws
          sudo mv bws /usr/local/bin/

      # Fetch all secrets from Bitwarden (using IDs from GitHub variables)
      # Set Bitwarden provider environment variables
      - name: Set Provider Environment Variables
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
        run: |
          echo "BW_ACCESS_TOKEN=${{ secrets.BW_ACCESS_TOKEN }}" >> $GITHUB_ENV

          # Use variable if provided, otherwise fetch dynamically from BWS
          ORG_ID="${{ vars.BW_ORGANIZATION_ID }}"
          if [ -z "$ORG_ID" ]; then
            echo "BW_ORGANIZATION_ID not set, fetching from BWS..."
            ORG_ID=$(bws project list --output json --color no | tr -cd '[:print:]\t\n' | jq -r '.[0].organizationId // empty')
          fi

          if [ -n "$ORG_ID" ]; then
            echo "BW_ORGANIZATION_ID=$ORG_ID" >> $GITHUB_ENV
          else
            echo "::error::Could not determine Bitwarden Organization ID"
            exit 1
          fi

          echo "PROXMOX_VE_API_TOKEN=${{ secrets.PROXMOX_VE_API_TOKEN }}" >> $GITHUB_ENV
          echo "TF_VAR_bws_access_token=${{ secrets.BW_ACCESS_TOKEN }}" >> $GITHUB_ENV
          echo "TF_VAR_hcloud_token=$HCLOUD_TOKEN" >> $GITHUB_ENV

      # Connect to Tailscale for Proxmox access
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ env.TS_CI_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_CI_OAUTH_SECRET }}
          tags: tag:ci

      - name: Write OCI config
        shell: bash
        run: |
          mkdir -p "$HOME/.oci"

          # Ensure config ends with a newline before appending
          printf "%s" "$OCI_CONFIG" > "$HOME/.oci/config"
          [ -n "$(tail -c1 "$HOME/.oci/config")" ] && echo "" >> "$HOME/.oci/config"

          printf "%s" "$OCI_PRIVATE_KEY" > "$HOME/.oci/oci_api_key.pem"
          chmod 600 "$HOME/.oci/config" "$HOME/.oci/oci_api_key.pem"

          # Update or append key_file path
          if grep -q '^key_file=' "$HOME/.oci/config"; then
            sed -i "s|^key_file=.*|key_file=$HOME/.oci/oci_api_key.pem|" "$HOME/.oci/config"
          else
            echo "key_file=$HOME/.oci/oci_api_key.pem" >> "$HOME/.oci/config"
          fi

          # Export OCI credentials
          echo "OCI_CLI_CONFIG_FILE=$HOME/.oci/config" >> $GITHUB_ENV
          echo "OCI_CLI_KEY_FILE=$HOME/.oci/oci_api_key.pem" >> $GITHUB_ENV

          # Extract fields safely (handle potential whitespace/comments)
          echo "OCI_CLI_USER=$(grep '^user=' $HOME/.oci/config | head -1 | cut -d'=' -f2 | tr -d '[:space:]')" >> $GITHUB_ENV
          echo "OCI_CLI_TENANCY=$(grep '^tenancy=' $HOME/.oci/config | head -1 | cut -d'=' -f2 | tr -d '[:space:]')" >> $GITHUB_ENV
          echo "OCI_CLI_FINGERPRINT=$(grep '^fingerprint=' $HOME/.oci/config | head -1 | cut -d'=' -f2 | tr -d '[:space:]')" >> $GITHUB_ENV
          echo "OCI_CLI_REGION=$(grep '^region=' $HOME/.oci/config | head -1 | cut -d'=' -f2 | tr -d '[:space:]')" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Decrypt Terraform Plan
        run: |
          gpg --decrypt --batch --passphrase "${{ secrets.BW_ACCESS_TOKEN }}" tfplan.gpg > tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="namespace=${{ env.OCI_NAMESPACE }}"
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          BW_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
          BW_ORGANIZATION_ID: ${{ env.BW_ORGANIZATION_ID }}
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          BW_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
          BW_ORGANIZATION_ID: ${{ env.BW_ORGANIZATION_ID }}
          TF_VAR_bws_access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          TF_VAR_hcloud_token: ${{ env.TF_VAR_hcloud_token }}
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
# CI Trigger
