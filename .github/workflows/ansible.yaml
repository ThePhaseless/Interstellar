name: Ansible

on:
  push:
    branches: [main, migration]
    paths:
      - "Ansible/setup-oracle.yaml"
      - "Ansible/setup-proxmox.yaml"
      - "Ansible/maintenance.yaml"
  workflow_dispatch:
    inputs:
      playbook:
        description: "Playbook to run (e.g., setup-oracle.yaml)"
        required: true
        default: "setup-oracle.yaml"
        type: choice
        options:
          - setup-oracle.yaml
          - setup-proxmox.yaml
          - maintenance.yaml

env:
  ANSIBLE_DIR: "./Ansible"

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    environment: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # Fetch secrets from Bitwarden (using IDs from GitHub variables)
      - name: Get Secrets from Bitwarden
        uses: bitwarden/sm-action@v2
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          secrets: |
            ${{ vars.BWS_ID_TS_CI_OAUTH_CLIENT_ID }} > TS_OAUTH_CLIENT_ID
            ${{ vars.BWS_ID_TS_CI_OAUTH_SECRET }} > TS_OAUTH_SECRET
            ${{ vars.BWS_ID_ORACLE_SSH_PRIVATE_KEY }} > ORACLE_SSH_KEY
            ${{ vars.BWS_ID_TAILSCALE_ORACLE_AUTH_KEY }} > TS_ORACLE_AUTHKEY

      # Connect to Tailscale for SSH access
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ env.ORACLE_SSH_KEY }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install Ansible
        run: uv tool install ansible-core

      - name: Cache Ansible Galaxy content
        uses: actions/cache@v5
        with:
          path: |
            ~/.ansible/collections
            ~/.ansible/roles
          key: ${{ runner.os }}-ansible-galaxy-${{ hashFiles('Ansible/requirements.yaml') }}
          restore-keys: |
            ${{ runner.os }}-ansible-galaxy-

      - name: Install Ansible collections
        run: ansible-galaxy install -r requirements.yaml
        working-directory: ${{ env.ANSIBLE_DIR }}

      - name: Get changed playbooks
        id: changed-files
        if: github.event_name == 'push'
        uses: tj-actions/changed-files@v47
        with:
          files: |
            Ansible/setup-oracle.yaml
            Ansible/setup-proxmox.yaml
            Ansible/maintenance.yaml

      # Determine which playbook to run
      - name: Set playbook
        id: playbook
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.playbook }}" >> $GITHUB_OUTPUT
          else
            # On push, run based on changed files
            CHANGED="${{ steps.changed-files.outputs.all_changed_files }}"

            if echo "$CHANGED" | grep -q "setup-proxmox"; then
              echo "name=setup-proxmox.yaml" >> $GITHUB_OUTPUT
            elif echo "$CHANGED" | grep -q "setup-oracle"; then
              echo "name=setup-oracle.yaml" >> $GITHUB_OUTPUT
            elif echo "$CHANGED" | grep -q "maintenance"; then
              echo "name=maintenance.yaml" >> $GITHUB_OUTPUT
            else
              echo "::error::Push event did not include a supported playbook change."
              exit 1
            fi
          fi

      - name: Run Ansible playbook
        run: |
          ansible-playbook ${{ steps.playbook.outputs.name }} \
            -e "tailscale_authkey=${{ env.TS_ORACLE_AUTHKEY }}"
        working-directory: ${{ env.ANSIBLE_DIR }}
        env:
          ANSIBLE_HOST_KEY_CHECKING: "false"
