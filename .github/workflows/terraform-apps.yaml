name: Terraform Apps

on:
  push:
    branches: [main, migration]
    paths:
      - "Terraform/apps/**"
      - ".github/workflows/terraform-apps.yaml"
  pull_request:
    branches: [main, migration]
    paths:
      - "Terraform/apps/**"
      - ".github/workflows/terraform-apps.yaml"
  workflow_dispatch:

env:
  TF_VERSION: "latest"
  TF_WORKING_DIR: "./Terraform/apps"

concurrency:
  group: terraform-apps

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get Secrets from Bitwarden
        uses: bitwarden/sm-action@f1de238fc00c738c56140796018be9084c2b5d21 # v2
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          secrets: |
            ${{ vars.BWS_ID_TS_CI_OAUTH_CLIENT_ID }} > TS_CI_OAUTH_CLIENT_ID
            ${{ vars.BWS_ID_TS_CI_OAUTH_SECRET }} > TS_CI_OAUTH_SECRET

      - name: Install BWS CLI
        run: |
          curl -sSL https://github.com/bitwarden/sdk/releases/download/bws-v1.0.0/bws-x86_64-unknown-linux-gnu-1.0.0.zip -o bws.zip
          unzip -o bws.zip
          chmod +x bws
          sudo mv bws /usr/local/bin/

      - name: Set Bitwarden Environment Variables
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
        run: |
          echo "BW_ACCESS_TOKEN=${{ secrets.BW_ACCESS_TOKEN }}" >> $GITHUB_ENV
          echo "BWS_ACCESS_TOKEN=${{ secrets.BW_ACCESS_TOKEN }}" >> $GITHUB_ENV

          ORG_ID="${{ vars.BW_ORGANIZATION_ID }}"
          if [ -z "$ORG_ID" ]; then
            echo "BW_ORGANIZATION_ID not set, fetching from BWS..."
            ORG_ID=$(bws project list --output json --color no | tr -cd '[:print:]\t\n' | jq -r '.[0].organizationId // empty')
          fi

          if [ -z "$ORG_ID" ]; then
            echo "::error::Could not determine Bitwarden Organization ID"
            exit 1
          fi

          echo "BW_ORGANIZATION_ID=$ORG_ID" >> $GITHUB_ENV

      - name: Connect to Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          oauth-client-id: ${{ env.TS_CI_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_CI_OAUTH_SECRET }}
          tags: tag:ci

      - name: Verify Tailscale Tags
        run: |
          SELF_TAGS=$(tailscale status --json | jq -r '.Self.Tags // [] | join(",")')
          echo "Tailscale self tags: ${SELF_TAGS:-<none>}"
          if ! echo "$SELF_TAGS" | grep -q "tag:ci"; then
            echo "::error::Runner is not tagged as tag:ci, CI ACL access will fail"
            tailscale status || true
            exit 1
          fi

      - name: Setup kubectl
        uses: azure/setup-kubectl@15650b3ad78fff148532a140b8a4c821796b2d7b # v5

      - name: Setup talosctl
        run: |
          curl -sL https://talos.dev/install | sh
          talosctl version --client

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube" "$HOME/.talos"

          TALOSCONFIG_VALUE=$(bws secret list --output json --color no | tr -cd '[:print:]\t\n' | jq -r '.[] | select(.key=="talosconfig") | .value // empty')
          if [ -z "$TALOSCONFIG_VALUE" ]; then
            echo "::error::Bitwarden key 'talosconfig' was not found"
            exit 1
          fi
          printf "%s\n" "$TALOSCONFIG_VALUE" > "$HOME/.talos/config"
          chmod 600 "$HOME/.talos/config"

          TS_TALOS_IP=$(tailscale status --json | jq -r '
            def v4_ips: (.TailscaleIPs // .Addresses // [] | map(select(test("^[0-9]+\\."))));
            (
              [(.Peer // {})[] | select(.Online == true) | select((.Tags // []) | index("tag:node")) | v4_ips[]] +
              [(.Peer // {})[] | select(.Online == true) | select((.Tags // []) | index("tag:cluster")) | v4_ips[]]
            ) | .[0] // empty
          ')
          if [ -z "$TS_TALOS_IP" ]; then
            echo "::error::Could not resolve Tailscale IP for any online tag:node device (or legacy tag:cluster fallback)"
            tailscale status || true
            exit 1
          fi

          talosctl --talosconfig "$HOME/.talos/config" -e "$TS_TALOS_IP" -n "$TS_TALOS_IP" kubeconfig "$HOME/.kube/config"
          sed -E -i "s#server: https://[^[:space:]]+#server: https://${TS_TALOS_IP}:6443#g" "$HOME/.kube/config"
          echo "Generated kubeconfig via talosctl with API endpoint https://${TS_TALOS_IP}:6443"

          chmod 600 "$HOME/.kube/config"
          echo "KUBE_CONFIG_PATH=$HOME/.kube/config" >> $GITHUB_ENV

          echo "Waiting for Kubernetes API to become reachable..."
          for i in {1..30}; do
            if kubectl --kubeconfig "$HOME/.kube/config" --request-timeout=5s get --raw='/version' >/dev/null 2>&1; then
              echo "Kubernetes API is reachable."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Timed out waiting for Kubernetes API via Tailscale"
              kubectl --kubeconfig "$HOME/.kube/config" --request-timeout=5s get --raw='/version' || true
              tailscale status || true
              exit 1
            fi
            sleep 5
          done

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        working-directory: ${{ env.TF_WORKING_DIR }}
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          BW_ACCESS_TOKEN: ${{ env.BW_ACCESS_TOKEN }}
          BW_ORGANIZATION_ID: ${{ env.BW_ORGANIZATION_ID }}

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          BW_ACCESS_TOKEN: ${{ env.BW_ACCESS_TOKEN }}
          BW_ORGANIZATION_ID: ${{ env.BW_ORGANIZATION_ID }}

      - name: Start App Port-Forwards
        run: |
          bash ./scripts/port-forward-apps.sh > /tmp/port-forward-apps.log 2>&1 &
          echo $! > /tmp/port-forward-apps.pid

          for port in 8989 7878 9696 3000 9000; do
            for i in {1..45}; do
              if (echo > "/dev/tcp/127.0.0.1/$port") >/dev/null 2>&1; then
                break
              fi
              if [ "$i" -eq 45 ]; then
                echo "::error::Timed out waiting for localhost:$port"
                tail -n 200 /tmp/port-forward-apps.log || true
                exit 1
              fi
              sleep 2
            done
          done

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -detailed-exitcode -out=tfplan
          PLAN_EXITCODE=$?
          set -e

          if [ "$PLAN_EXITCODE" -eq 1 ]; then
            echo "::error::terraform plan failed"
            exit 1
          fi

          if [ "$PLAN_EXITCODE" -eq 2 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            terraform show -no-color tfplan > plan_full.txt
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "Terraform plan is empty. Skipping apply artifact generation."
          fi
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          BW_ACCESS_TOKEN: ${{ env.BW_ACCESS_TOKEN }}
          BW_ORGANIZATION_ID: ${{ env.BW_ORGANIZATION_ID }}

      - name: Encrypt Plan
        if: steps.plan.outputs.has_changes == 'true'
        run: |
          gpg --symmetric --batch --passphrase "${{ secrets.BW_ACCESS_TOKEN }}" tfplan
          gpg --symmetric --batch --passphrase "${{ secrets.BW_ACCESS_TOKEN }}" plan_full.txt
          rm -f tfplan plan_full.txt
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: steps.plan.outputs.has_changes == 'true'
        with:
          name: tfplan-apps
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan.gpg
            ${{ env.TF_WORKING_DIR }}/plan_full.txt.gpg

      - name: Stop App Port-Forwards
        if: always()
        run: |
          if [ -f /tmp/port-forward-apps.pid ]; then
            kill "$(cat /tmp/port-forward-apps.pid)" 2>/dev/null || true
          fi
          pkill -f "kubectl port-forward" 2>/dev/null || true

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.plan.outputs.has_changes == 'true'
    environment: server
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Get Secrets from Bitwarden
        uses: bitwarden/sm-action@f1de238fc00c738c56140796018be9084c2b5d21 # v2
        with:
          access_token: ${{ secrets.BW_ACCESS_TOKEN }}
          secrets: |
            ${{ vars.BWS_ID_TS_CI_OAUTH_CLIENT_ID }} > TS_CI_OAUTH_CLIENT_ID
            ${{ vars.BWS_ID_TS_CI_OAUTH_SECRET }} > TS_CI_OAUTH_SECRET

      - name: Install BWS CLI
        run: |
          curl -sSL https://github.com/bitwarden/sdk/releases/download/bws-v1.0.0/bws-x86_64-unknown-linux-gnu-1.0.0.zip -o bws.zip
          unzip -o bws.zip
          chmod +x bws
          sudo mv bws /usr/local/bin/

      - name: Set Bitwarden Environment Variables
        env:
          BWS_ACCESS_TOKEN: ${{ secrets.BW_ACCESS_TOKEN }}
        run: |
          echo "BW_ACCESS_TOKEN=${{ secrets.BW_ACCESS_TOKEN }}" >> $GITHUB_ENV
          echo "BWS_ACCESS_TOKEN=${{ secrets.BW_ACCESS_TOKEN }}" >> $GITHUB_ENV

          ORG_ID="${{ vars.BW_ORGANIZATION_ID }}"
          if [ -z "$ORG_ID" ]; then
            echo "BW_ORGANIZATION_ID not set, fetching from BWS..."
            ORG_ID=$(bws project list --output json --color no | tr -cd '[:print:]\t\n' | jq -r '.[0].organizationId // empty')
          fi

          if [ -z "$ORG_ID" ]; then
            echo "::error::Could not determine Bitwarden Organization ID"
            exit 1
          fi

          echo "BW_ORGANIZATION_ID=$ORG_ID" >> $GITHUB_ENV

      - name: Connect to Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4
        with:
          oauth-client-id: ${{ env.TS_CI_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TS_CI_OAUTH_SECRET }}
          tags: tag:ci

      - name: Verify Tailscale Tags
        run: |
          SELF_TAGS=$(tailscale status --json | jq -r '.Self.Tags // [] | join(",")')
          echo "Tailscale self tags: ${SELF_TAGS:-<none>}"
          if ! echo "$SELF_TAGS" | grep -q "tag:ci"; then
            echo "::error::Runner is not tagged as tag:ci, CI ACL access will fail"
            tailscale status || true
            exit 1
          fi

      - name: Setup kubectl
        uses: azure/setup-kubectl@15650b3ad78fff148532a140b8a4c821796b2d7b # v5

      - name: Setup talosctl
        run: |
          TALOSCTL_VERSION=v1.12.4
          curl -sSL "https://github.com/siderolabs/talos/releases/download/${TALOSCTL_VERSION}/talosctl-linux-amd64" -o talosctl
          chmod +x talosctl
          sudo mv talosctl /usr/local/bin/talosctl
          talosctl version --client

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube" "$HOME/.talos"

          TALOSCONFIG_VALUE=$(bws secret list --output json --color no | tr -cd '[:print:]\t\n' | jq -r '.[] | select(.key=="talosconfig") | .value // empty')
          if [ -z "$TALOSCONFIG_VALUE" ]; then
            echo "::error::Bitwarden key 'talosconfig' was not found"
            exit 1
          fi
          printf "%s\n" "$TALOSCONFIG_VALUE" > "$HOME/.talos/config"
          chmod 600 "$HOME/.talos/config"

          TS_TALOS_IP=$(tailscale status --json | jq -r '
            def v4_ips: (.TailscaleIPs // .Addresses // [] | map(select(test("^[0-9]+\\."))));
            (
              [(.Peer // {})[] | select(.Online == true) | select((.Tags // []) | index("tag:node")) | v4_ips[]] +
              [(.Peer // {})[] | select(.Online == true) | select((.Tags // []) | index("tag:cluster")) | v4_ips[]]
            ) | .[0] // empty
          ')
          if [ -z "$TS_TALOS_IP" ]; then
            echo "::error::Could not resolve Tailscale IP for any online tag:node device (or legacy tag:cluster fallback)"
            tailscale status || true
            exit 1
          fi

          talosctl --talosconfig "$HOME/.talos/config" -e "$TS_TALOS_IP" -n "$TS_TALOS_IP" kubeconfig "$HOME/.kube/config"
          sed -E -i "s#server: https://[^[:space:]]+#server: https://${TS_TALOS_IP}:6443#g" "$HOME/.kube/config"
          echo "Generated kubeconfig via talosctl with API endpoint https://${TS_TALOS_IP}:6443"

          chmod 600 "$HOME/.kube/config"
          echo "KUBE_CONFIG_PATH=$HOME/.kube/config" >> $GITHUB_ENV

          echo "Waiting for Kubernetes API to become reachable..."
          for i in {1..30}; do
            if kubectl --kubeconfig "$HOME/.kube/config" --request-timeout=5s get --raw='/version' >/dev/null 2>&1; then
              echo "Kubernetes API is reachable."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Timed out waiting for Kubernetes API via Tailscale"
              kubectl --kubeconfig "$HOME/.kube/config" --request-timeout=5s get --raw='/version' || true
              tailscale status || true
              exit 1
            fi
            sleep 5
          done

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -input=false
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          BW_ACCESS_TOKEN: ${{ env.BW_ACCESS_TOKEN }}
          BW_ORGANIZATION_ID: ${{ env.BW_ORGANIZATION_ID }}

      - name: Start App Port-Forwards
        run: |
          bash ./scripts/port-forward-apps.sh > /tmp/port-forward-apps.log 2>&1 &
          echo $! > /tmp/port-forward-apps.pid

          for port in 8989 7878 9696 3000 9000; do
            for i in {1..45}; do
              if (echo > "/dev/tcp/127.0.0.1/$port") >/dev/null 2>&1; then
                break
              fi
              if [ "$i" -eq 45 ]; then
                echo "::error::Timed out waiting for localhost:$port"
                tail -n 200 /tmp/port-forward-apps.log || true
                exit 1
              fi
              sleep 2
            done
          done

      - name: Download Terraform Plan
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: tfplan-apps
          path: ${{ env.TF_WORKING_DIR }}

      - name: Decrypt Terraform Plan
        run: |
          gpg --decrypt --batch --passphrase "${{ secrets.BW_ACCESS_TOKEN }}" tfplan.gpg > tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          BW_ACCESS_TOKEN: ${{ env.BW_ACCESS_TOKEN }}
          BW_ORGANIZATION_ID: ${{ env.BW_ORGANIZATION_ID }}

      - name: Stop App Port-Forwards
        if: always()
        run: |
          if [ -f /tmp/port-forward-apps.pid ]; then
            kill "$(cat /tmp/port-forward-apps.pid)" 2>/dev/null || true
          fi
          pkill -f "kubectl port-forward" 2>/dev/null || true
